<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificações TikTok</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
    background: #fff;
}

.top-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-top: 10px;
}

h1 {
    font-size: 20px;
    font-weight: normal;
    margin: 20px 0;
}

.bold {
    font-weight: bold;
}

.sub {
    font-size: 14px;
    margin-bottom: 15px;
}

.btn {
    display: block;
    background: #d61c7f;
    color: #fff;
    padding: 15px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    margin: 15px 0;
}

.btn:hover {
    opacity: 0.9;
}

.prova {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGEM TOPO -->
<img src="SUA-IMAGEM-1.jpg" class="top-img">

<!-- COPY -->
<h1>
Faça <span class="bold">classificações</span> no 
<span style="color:#4285F4;">G</span>
<span style="color:#EA4335;">o</span>
<span style="color:#FBBC05;">o</span>
<span style="color:#4285F4;">g</span>
<span style="color:#34A853;">l</span>
<span style="color:#EA4335;">e</span>
Maps e saque de <span class="bold">500 a $ 1k dia...</span>
</h1>

<div class="sub">
Grupo 100% Grátis<br>
<strong>(Toque abaixo e Entre)</strong>
</div>

<!-- BOTÃO -->
<a href="#" class="btn">ENTRAR AGORA MESMO ➜</a>

<!-- PROVA -->
<img src="SUA-IMAGEM-2.jpg" class="prova">

</div>

</body>
</html>
