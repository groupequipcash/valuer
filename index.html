<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressel</title>

  <style>
    body {
      margin: 0;
      background: #efefef;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 25px 15px;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .topo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 21px;
      font-weight: normal;
      line-height: 1.3;
    }

    .bold {
      font-weight: bold;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
    }

    .btn {
      display: block;
      margin: 20px auto;
      padding: 18px;
      width: 90%;
      max-width: 320px;
      background: #d81b84;
      color: #fff;
      text-decoration: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 17px;
    }

    .prova {
      width: 100%;
      max-width: 300px;
      border-radius: 20px;
      margin-top: 10px;
    }

    .g1 { color: #4285F4; }
    .g2 { color: #EA4335; }
    .g3 { color: #FBBC05; }
    .g4 { color: #4285F4; }
    .g5 { color: #34A853; }
    .g6 { color: #EA4335; }
  </style>
</head>

<body>

<div class="container">

  <!-- IMAGEM TOPO -->
  <img src="./topo.jpg" class="topo">

  <!-- COPY -->
  <h1>
    Faça <span class="bold">classificações</span> no 
    <span class="g1">G</span><span class="g2">o</span><span class="g3">o</span><span class="g4">g</span><span class="g5">l</span><span class="g6">e</span>
    Maps e saque de <span class="bold">500 a $ 1k dia...</span>
  </h1>

  <div class="sub">
    Grupo 100% Grátis<br>
    <strong>(Toque abaixo e Entre)</strong>
  </div>

  <!-- BOTÃO -->
  <a href="#" class="btn">ENTRAR AGORA MESMO ➜</a>

  <!-- PROVA -->
  <img src="./prova.jpg" class="prova">

</div>

</body>
</html>
