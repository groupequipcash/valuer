<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classificações no Tiktok</title>
  <meta
    name="description"
    content="Aprenda a fazer classificações no Tiktok Shop e ganhe até $1.000 por dia."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #efefef;
      font-family: 'Montserrat', sans-serif;
      color: #191c1f;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .top-image {
      width: 152px;
      max-width: 100%;
      height: auto;
      display: block;
      margin-bottom: 18px;
    }

    .headline {
      font-size: 20px;
      line-height: 1.35;
      margin: 0 0 18px;
      font-weight: 400;
    }

    .headline strong {
      font-weight: 700;
    }

    .shop {
      color: #f7084c;
      font-weight: 700;
    }

    .subtext {
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .subtext strong {
      font-weight: 700;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 324px;
      min-height: 56px;
      padding: 14px 22px;
      border: none;
      border-radius: 28px;
      background: #f50649;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 30px;
      animation: pulsate 1s linear 8 both;
    }

    .proof-image {
      width: 100%;
      max-width: 284px;
      height: auto;
      display: block;
      border-radius: 4px;
    }

    @keyframes pulsate {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <main class="page">
    <img
      class="top-image"
      src="https://static-media.hotmart.com/XbAs4uGNIc_CIO_hmhxG240osvo=/filters:quality(100):format(webp)/klickart-prod/uploads/media/file/10572262/suporte_(1).png"
      alt=""
    >

    <h1 class="headline">
      Faça avaliações no Tiktok<span class="shop">shop</span> e saque de <strong>500 a $ 1k dia...</strong>
    </h1>

    <div class="subtext">
      <div>Grupo 100% Grátis</div>
      <div><strong>(Toque abaixo e Entre)</strong></div>
    </div>

    <a class="cta" href="https://t.me/+LDAc2P8e5B9jYjg5">
      ENTRAR AGORA MESMO ➜
    </a>

    <img
      class="proof-image"
      src="https://static-media.hotmart.com/itugPfx_9HqHNiLSpWf5lnBseqE=/filters:quality(100):format(webp)/klickart-prod/uploads/media/file/10572235/whatsapp_image_2026-04-09_at_09.17.32.jpeg"
      alt=""
    >
  </main>
</body>
</html>
